name: Code quality

on:
  push:
    branches: [ main ] # 🌟 已修改：监听 main 分支
  pull_request:
    branches: [ main ] # 🌟 已修改：监听针对 main 的拉取请求

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Biome
        uses: biomejs/setup-biome@v2
        with:
          version: latest
      - name: Run Biome
        run: biome ci ./src --reporter=github